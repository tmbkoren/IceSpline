name: Deploy
on:
  push:
    branches: [main]            # repo default is main (not master)
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Emscripten
        run: |
          # Clone OUTSIDE the workspace so Vitest's **/*.test.js glob never picks
          # up emsdk's own test fixtures.
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          cd "$HOME/emsdk"
          ./emsdk install latest
          ./emsdk activate latest
          # Persist emcc on PATH for subsequent steps (each step is a fresh shell)
          echo "$HOME/emsdk" >> "$GITHUB_PATH"
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"
      - run: bash wasm/build.sh
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages }
    steps:
      - uses: actions/deploy-pages@v4
